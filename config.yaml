# Klaxxon Meeting Reminder Configuration

timezone: "Europe/London"

# Escalation pattern for meeting reminders.
# offset_hours: time relative to meeting start (negative = before)
# interval_min: null for single ping, number for repeating
# message: template with {title}, {time}, {link}, {mins_until}, {mins_ago}
escalation:
  stages:
    - offset_hours: -24
      interval_min: null
      message: "Tomorrow: {title} at {time}. {link}"

    - offset_hours: -2
      interval_min: null
      message: "{title} in 2 hours. {link}"

    - offset_hours: -0.5
      interval_min: 5
      message: "{title} in {mins_until} min. {link}"

    - offset_hours: -0.25
      interval_min: 2
      message: "{title} in {mins_until} min! {link}"

    - offset_hours: 0
      interval_min: 1
      message: "JOIN NOW: {title}. {link}"

  # After meeting start time, keep pinging until ack or timeout
  post_start_interval_min: 2
  post_start_message: "MEETING STARTED {mins_ago} min ago: {title}. {link}"
  timeout_after_min: 90

# Scheduler
scheduler:
  check_interval_sec: 60

# Signal commands (incoming message keywords)
commands:
  acknowledge: ["ack", "joining"]
  skip: ["skip"]
  list: ["list", "meetings"]
  help: ["help"]
