# Klaxxon Reminder Configuration

timezone: "Europe/London"

# Escalation profiles for reminders.
# Each profile defines timing patterns, targets, and timeout behavior.
# target: "self" (owner) or "escalate" (reminder's escalate_to field)
escalation_profiles:
  meeting:
    stages:
      - offset_hours: -24
        interval_min: null
        target: self
        message: "Tomorrow: {title} at {time}. {link}"
      - offset_hours: -2
        interval_min: null
        target: self
        message: "{title} in 2 hours. {link}"
      - offset_hours: -0.5
        interval_min: 5
        target: self
        message: "{title} in {mins_until} min. {link}"
      - offset_hours: -0.25
        interval_min: 2
        target: self
        message: "{title} in {mins_until} min! {link}"
      - offset_hours: 0
        interval_min: 1
        target: self
        message: "JOIN NOW: {title}. {link}"
    post_start_interval_min: 2
    post_start_target: self
    post_start_message: "MEETING STARTED {mins_ago} min ago: {title}. {link}"
    overflow:
      after_min: 10
      interval_min: 5
      target: escalate
      message: "Jason hasn't joined: {title} (started {mins_ago} min ago)"
    timeout_after_min: 90

  persistent:
    stages:
      - offset_hours: 0
        interval_min: 5
        target: self
        message: "{title}. {description}"
    post_start_interval_min: 5
    post_start_target: self
    post_start_message: "OVERDUE ({mins_ago} min): {title}. {description}"
    overflow:
      after_min: 30
      interval_min: 10
      target: escalate
      message: "Jason hasn't done: {title} ({mins_ago} min overdue)"
    timeout_after_min: null

  gentle:
    stages:
      - offset_hours: -0.25
        interval_min: 15
        target: self
        message: "Reminder: {title}. {description}"
    post_start_interval_min: 15
    post_start_target: self
    post_start_message: "OVERDUE: {title}. {description}"
    overflow:
      after_min: 60
      interval_min: 30
      target: escalate
      message: "Jason hasn't actioned: {title} ({mins_ago} min overdue)"
    timeout_after_min: 480

# Scheduler
scheduler:
  check_interval_sec: 60

# Housekeeping: age-out of terminal reminders (ACKNOWLEDGED, SKIPPED, MISSED)
housekeeping:
  retention_days: 30        # days to keep terminal reminders (0 = disable auto-cleanup)
  cleanup_interval_hours: 1 # how often automatic cleanup runs (hours)

# Signal commands (incoming message keywords)
commands:
  acknowledge: ["ack", "joining"]
  skip: ["skip"]
  list: ["list", "meetings"]
  help: ["help"]
