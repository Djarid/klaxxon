<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klaxxon</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body x-data="klaxxon()" x-init="init()">

    <!-- Login screen -->
    <template x-if="!authenticated">
        <div class="login-screen">
            <h1>KLAXXON</h1>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Reminder service</p>

            <div class="login-form">
                <template x-if="error">
                    <div class="alert alert-error" x-text="error"></div>
                </template>

                <div class="form-group">
                    <label for="token">Bearer token</label>
                    <input id="token" type="password" x-model="token"
                           placeholder="Paste your API token"
                           @keydown.enter="login()">
                </div>
                <button class="btn btn-primary" style="width:100%"
                        @click="login()" :disabled="!token">
                    Connect
                </button>
            </div>
        </div>
    </template>

    <!-- Main app -->
    <template x-if="authenticated">
        <div class="container">
            <header>
                <h1>KLAXXON</h1>
                <div class="health-bar">
                    <span>
                        <span class="status-dot" :class="health.signal_connected ? 'ok' : 'error'"></span>
                        Signal
                    </span>
                    <span>
                        <span class="status-dot" :class="health.db_ok ? 'ok' : 'error'"></span>
                        DB
                    </span>
                    <span x-text="health.reminders_pending + ' pending'"></span>
                    <span x-text="health.reminders_reminding + ' reminding'"></span>
                    <button class="btn btn-sm" @click="logout()">Logout</button>
                </div>
            </header>

            <!-- Alerts -->
            <template x-if="error">
                <div class="alert alert-error" x-text="error"></div>
            </template>
            <template x-if="success">
                <div class="alert alert-success" x-text="success"></div>
            </template>

            <!-- New/Edit reminder form (collapsible) -->
            <div class="section">
                <div class="section-header">
                    <h2>Reminders</h2>
                    <button class="btn btn-sm btn-primary"
                            @click="showForm = !showForm; editingId = null; resetForm()"
                            x-text="showForm ? 'Cancel' : '+ New'">
                    </button>
                </div>

                <template x-if="showForm">
                    <div class="panel">
                        <h3 x-text="editingId ? 'Edit Reminder' : 'New Reminder'" style="margin-top: 0; margin-bottom: 1rem;"></h3>
                        <div class="form-group">
                            <label for="m-title">Title</label>
                            <input id="m-title" type="text" x-model="form.title"
                                   placeholder="Economy PWG" @keydown.enter="saveReminder()">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="m-date">Date &amp; time</label>
                                <input id="m-date" type="datetime-local" x-model="form.starts_at">
                            </div>
                            <div class="form-group">
                                <label for="m-duration">Duration (min)</label>
                                <input id="m-duration" type="number" x-model.number="form.duration_min"
                                       min="1" max="1440" placeholder="90">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="m-link">Link (optional)</label>
                            <input id="m-link" type="url" x-model="form.link"
                                   placeholder="https://zoom.us/j/...">
                        </div>
                        <div class="form-group">
                            <label for="m-description">Notes (optional)</label>
                            <textarea id="m-description" x-model="form.description"
                                      placeholder="Optional notes or description"
                                      rows="3"></textarea>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="m-profile">Profile</label>
                                <select id="m-profile" x-model="form.profile">
                                    <option value="meeting">Meeting</option>
                                    <option value="persistent">Persistent</option>
                                    <option value="gentle">Gentle</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="m-escalate">Escalate to (optional)</label>
                                <input id="m-escalate" type="tel" x-model="form.escalate_to"
                                       placeholder="+441234567890">
                            </div>
                        </div>
                        <button class="btn btn-primary" @click="saveReminder()"
                                :disabled="!form.title || !form.starts_at || creating">
                            <span x-text="creating ? (editingId ? 'Updating...' : 'Creating...') : (editingId ? 'Update reminder' : 'Create reminder')"></span>
                        </button>
                    </div>
                </template>
            </div>

            <!-- Reminder list -->
            <div class="section">
                <template x-if="reminders.length === 0">
                    <div class="empty">No reminders. Add one above.</div>
                </template>

                <template x-for="r in reminders" :key="r.id">
                    <div class="reminder-card" :class="r.state">
                        <div style="display: flex; align-items: center; gap: 0.5rem;">
                            <span class="badge" :class="'badge-' + r.state"
                                  x-text="r.state"></span>
                            <span class="title" x-text="r.title"></span>
                            <template x-if="r.profile !== 'meeting'">
                                <span class="badge" style="background: var(--primary); color: white;"
                                      x-text="r.profile"></span>
                            </template>
                        </div>

                        <div class="meta">
                            <span x-text="formatDate(r.starts_at)"></span>
                            <span x-text="r.duration_min + ' min'"></span>
                            <span x-text="'#' + r.id"></span>
                            <span x-text="'via ' + r.source"></span>
                            <template x-if="r.schedule_id">
                                <span x-text="'from: Schedule #' + r.schedule_id"></span>
                            </template>
                            <template x-if="r.escalate_to">
                                <span x-text="'escalate: ' + r.escalate_to"></span>
                            </template>
                        </div>

                        <template x-if="r.link">
                            <a class="reminder-link" :href="r.link" target="_blank"
                               rel="noopener" x-text="r.link"></a>
                        </template>

                        <template x-if="r.description">
                            <div style="font-size: 0.85rem; color: var(--text-muted); margin-top: 0.5rem; white-space: pre-wrap;"
                                 x-text="r.description"></div>
                        </template>

                        <template x-if="r.ack_keyword">
                            <div style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.25rem;">
                                Acked with "<span x-text="r.ack_keyword"></span>"
                                at <span x-text="formatDate(r.ack_at)"></span>
                            </div>
                        </template>

                        <div class="actions">
                            <template x-if="r.state === 'pending' || r.state === 'reminding'">
                                <button class="btn btn-sm btn-success"
                                        @click="ackReminder(r.id)">Ack</button>
                            </template>
                            <template x-if="r.state === 'pending' || r.state === 'reminding'">
                                <button class="btn btn-sm btn-warning"
                                        @click="skipReminder(r.id)">Skip</button>
                            </template>
                            <template x-if="r.state === 'pending' || r.state === 'reminding'">
                                <button class="btn btn-sm"
                                        @click="startEdit(r)">Edit</button>
                            </template>
                            <button class="btn btn-sm btn-danger"
                                    @click="deleteReminder(r.id)">Delete</button>
                        </div>
                    </div>
                </template>
            </div>

            <!-- Schedules section -->
            <div class="section">
                <div class="section-header">
                    <h2>Schedules</h2>
                    <button class="btn btn-sm btn-primary"
                            @click="showScheduleForm = !showScheduleForm; editingScheduleId = null; resetScheduleForm()"
                            x-text="showScheduleForm ? 'Cancel' : '+ New'">
                    </button>
                </div>

                <template x-if="showScheduleForm">
                    <div class="panel">
                        <h3 x-text="editingScheduleId ? 'Edit Schedule' : 'New Schedule'" style="margin-top: 0; margin-bottom: 1rem;"></h3>
                        <div class="form-group">
                            <label for="s-title">Title</label>
                            <input id="s-title" type="text" x-model="scheduleForm.title"
                                   placeholder="Daily medication" @keydown.enter="saveSchedule()">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="s-time">Time of day</label>
                                <input id="s-time" type="time" x-model="scheduleForm.time_of_day">
                            </div>
                            <div class="form-group">
                                <label for="s-duration">Duration (min)</label>
                                <input id="s-duration" type="number" x-model.number="scheduleForm.duration_min"
                                       min="0" max="1440" placeholder="0">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="s-description">Notes (optional)</label>
                            <textarea id="s-description" x-model="scheduleForm.description"
                                      placeholder="Optional notes or description"
                                      rows="3"></textarea>
                        </div>
                        <div class="form-group">
                            <label for="s-link">Link (optional)</label>
                            <input id="s-link" type="url" x-model="scheduleForm.link"
                                   placeholder="https://...">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="s-profile">Profile</label>
                                <select id="s-profile" x-model="scheduleForm.profile">
                                    <option value="meeting">Meeting</option>
                                    <option value="persistent">Persistent</option>
                                    <option value="gentle">Gentle</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="s-escalate">Escalate to (optional)</label>
                                <input id="s-escalate" type="tel" x-model="scheduleForm.escalate_to"
                                       placeholder="+441234567890">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="s-recurrence">Recurrence</label>
                                <select id="s-recurrence" x-model="scheduleForm.recurrence">
                                    <option value="daily">Daily</option>
                                    <option value="weekly">Weekly</option>
                                    <option value="custom">Custom</option>
                                </select>
                            </div>
                            <div class="form-group" x-show="scheduleForm.recurrence === 'weekly' || scheduleForm.recurrence === 'custom'">
                                <label for="s-rule">Days (comma-separated)</label>
                                <input id="s-rule" type="text" x-model="scheduleForm.recurrence_rule"
                                       placeholder="mon,wed,fri">
                            </div>
                        </div>
                        <button class="btn btn-primary" @click="saveSchedule()"
                                :disabled="!scheduleForm.title || !scheduleForm.time_of_day || creating">
                            <span x-text="creating ? (editingScheduleId ? 'Updating...' : 'Creating...') : (editingScheduleId ? 'Update schedule' : 'Create schedule')"></span>
                        </button>
                    </div>
                </template>

                <!-- Schedule list -->
                <template x-if="schedules.length === 0">
                    <div class="empty">No schedules. Add one above.</div>
                </template>

                <template x-for="s in schedules" :key="s.id">
                    <div class="reminder-card" :class="s.is_active ? '' : 'inactive'">
                        <div style="display: flex; align-items: center; gap: 0.5rem;">
                            <span class="title" x-text="s.title"></span>
                            <span class="badge" style="background: var(--primary); color: white;"
                                  x-text="s.recurrence"></span>
                            <template x-if="s.profile !== 'meeting'">
                                <span class="badge" style="background: var(--primary); color: white;"
                                      x-text="s.profile"></span>
                            </template>
                            <template x-if="!s.is_active">
                                <span class="badge" style="background: var(--text-muted); color: white;">inactive</span>
                            </template>
                        </div>

                        <div class="meta">
                            <span x-text="s.time_of_day"></span>
                            <template x-if="s.recurrence_rule">
                                <span x-text="s.recurrence_rule"></span>
                            </template>
                            <span x-text="'#' + s.id"></span>
                        </div>

                        <template x-if="s.link">
                            <a class="reminder-link" :href="s.link" target="_blank"
                               rel="noopener" x-text="s.link"></a>
                        </template>

                        <template x-if="s.description">
                            <div style="font-size: 0.85rem; color: var(--text-muted); margin-top: 0.5rem; white-space: pre-wrap;"
                                 x-text="s.description"></div>
                        </template>

                        <div class="actions">
                            <button class="btn btn-sm"
                                    @click="startEditSchedule(s)">Edit</button>
                            <template x-if="s.is_active">
                                <button class="btn btn-sm btn-warning"
                                        @click="toggleSchedule(s.id, false)">Deactivate</button>
                            </template>
                            <template x-if="!s.is_active">
                                <button class="btn btn-sm btn-success"
                                        @click="toggleSchedule(s.id, true)">Activate</button>
                            </template>
                            <button class="btn btn-sm btn-danger"
                                    @click="deleteSchedule(s.id)">Delete</button>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </template>

<script>
function klaxxon() {
    return {
        /* Auth state */
        authenticated: false,
        token: localStorage.getItem('klaxxon_token') || '',

        /* UI state */
        error: '',
        success: '',
        showForm: false,
        showScheduleForm: false,
        creating: false,
        editingId: null,
        editingScheduleId: null,

        /* Data */
        reminders: [],
        schedules: [],
        health: {
            status: 'unknown',
            signal_connected: false,
            db_ok: false,
            reminders_pending: 0,
            reminders_reminding: 0,
        },

        /* New reminder form */
        form: {
            title: '',
            starts_at: '',
            duration_min: 90,
            link: '',
            description: '',
            profile: 'meeting',
            escalate_to: '',
        },

        /* New schedule form */
        scheduleForm: {
            title: '',
            time_of_day: '09:00',
            duration_min: 0,
            link: '',
            description: '',
            profile: 'meeting',
            escalate_to: '',
            recurrence: 'daily',
            recurrence_rule: '',
        },

        /* Polling */
        _pollInterval: null,

        init() {
            if (this.token) {
                this.authenticated = true;
                this.refresh();
                this._startPolling();
            }
        },

        /* Auth */
        async login() {
            this.error = '';
            try {
                const resp = await this._fetch('/api/health');
                if (resp.ok) {
                    localStorage.setItem('klaxxon_token', this.token);
                    this.authenticated = true;
                    this.refresh();
                    this._startPolling();
                } else if (resp.status === 401 || resp.status === 403) {
                    this.error = 'Invalid token.';
                } else {
                    this.error = `API returned ${resp.status}`;
                }
            } catch (e) {
                this.error = `Connection failed: ${e.message}`;
            }
        },

        logout() {
            this.authenticated = false;
            this.token = '';
            this.reminders = [];
            localStorage.removeItem('klaxxon_token');
            this._stopPolling();
        },

        /* Data loading */
        async refresh() {
            await Promise.all([this.loadReminders(), this.loadSchedules(), this.loadHealth()]);
        },

        async loadReminders() {
            try {
                const resp = await this._fetch('/api/reminders');
                if (resp.ok) {
                    const data = await resp.json();
                    this.reminders = data.reminders.sort((a, b) => {
                        const order = { reminding: 0, pending: 1, acknowledged: 2, skipped: 3, missed: 4 };
                        const stateA = order[a.state] ?? 5;
                        const stateB = order[b.state] ?? 5;
                        if (stateA !== stateB) return stateA - stateB;
                        return new Date(a.starts_at) - new Date(b.starts_at);
                    });
                }
            } catch (e) {
                /* silent on poll failure */
            }
        },

        async loadSchedules() {
            try {
                const resp = await this._fetch('/api/schedules?active_only=false');
                if (resp.ok) {
                    const data = await resp.json();
                    this.schedules = data.schedules.sort((a, b) => {
                        if (a.is_active !== b.is_active) return b.is_active - a.is_active;
                        return a.time_of_day.localeCompare(b.time_of_day);
                    });
                }
            } catch (e) {
                /* silent on poll failure */
            }
        },

        async loadHealth() {
            try {
                const resp = await this._fetch('/api/health');
                if (resp.ok) {
                    this.health = await resp.json();
                }
            } catch (e) {
                /* silent */
            }
        },

        /* Actions */
        resetForm() {
            this.form = { title: '', starts_at: '', duration_min: 90, link: '', description: '', profile: 'meeting', escalate_to: '' };
        },

        resetScheduleForm() {
            this.scheduleForm = { title: '', time_of_day: '09:00', duration_min: 0, link: '', description: '', profile: 'meeting', escalate_to: '', recurrence: 'daily', recurrence_rule: '' };
        },

        startEdit(reminder) {
            this.editingId = reminder.id;
            this.showForm = true;
            /* Convert ISO datetime to local datetime-local format */
            const dt = new Date(reminder.starts_at);
            const localDt = new Date(dt.getTime() - dt.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
            this.form = {
                title: reminder.title,
                starts_at: localDt,
                duration_min: reminder.duration_min,
                link: reminder.link || '',
                description: reminder.description || '',
                profile: reminder.profile,
                escalate_to: reminder.escalate_to || '',
            };
        },

        async saveReminder() {
            this.error = '';
            this.success = '';
            this.creating = true;

            /* Convert local datetime to ISO with timezone */
            const dt = new Date(this.form.starts_at);
            const body = {
                title: this.form.title,
                starts_at: dt.toISOString(),
                duration_min: this.form.duration_min || 90,
                profile: this.form.profile || 'meeting',
            };
            if (!this.editingId) {
                body.source = 'web';
            }
            if (this.form.link) body.link = this.form.link;
            if (this.form.description) body.description = this.form.description;
            if (this.form.escalate_to) body.escalate_to = this.form.escalate_to;

            try {
                const method = this.editingId ? 'PATCH' : 'POST';
                const url = this.editingId ? `/api/reminders/${this.editingId}` : '/api/reminders';
                const resp = await this._fetch(url, {
                    method: method,
                    body: JSON.stringify(body),
                });

                if (resp.ok) {
                    this.success = this.editingId ? 'Reminder updated.' : 'Reminder created.';
                    this.resetForm();
                    this.editingId = null;
                    this.showForm = false;
                    await this.refresh();
                    this._clearAlerts();
                } else {
                    const err = await resp.json();
                    this.error = err.detail || `Error ${resp.status}`;
                }
            } catch (e) {
                this.error = `Failed: ${e.message}`;
            } finally {
                this.creating = false;
            }
        },

        async ackReminder(id) {
            this.error = '';
            this.success = '';
            try {
                const resp = await this._fetch(`/api/reminders/${id}/ack`, {
                    method: 'POST',
                    body: JSON.stringify({ keyword: 'web' }),
                });
                if (resp.ok) {
                    this.success = 'Reminder acknowledged.';
                    await this.refresh();
                    this._clearAlerts();
                } else {
                    const err = await resp.json();
                    this.error = err.detail || `Error ${resp.status}`;
                }
            } catch (e) {
                this.error = `Failed: ${e.message}`;
            }
        },

        async skipReminder(id) {
            this.error = '';
            this.success = '';
            try {
                const resp = await this._fetch(`/api/reminders/${id}/skip`, {
                    method: 'POST',
                });
                if (resp.ok) {
                    this.success = 'Reminder skipped.';
                    await this.refresh();
                    this._clearAlerts();
                } else {
                    const err = await resp.json();
                    this.error = err.detail || `Error ${resp.status}`;
                }
            } catch (e) {
                this.error = `Failed: ${e.message}`;
            }
        },

        async deleteReminder(id) {
            this.error = '';
            this.success = '';
            try {
                const resp = await this._fetch(`/api/reminders/${id}`, {
                    method: 'DELETE',
                });
                if (resp.ok) {
                    this.success = 'Reminder deleted.';
                    await this.refresh();
                    this._clearAlerts();
                } else {
                    const err = await resp.json();
                    this.error = err.detail || `Error ${resp.status}`;
                }
            } catch (e) {
                this.error = `Failed: ${e.message}`;
            }
        },

        /* Schedule actions */
        startEditSchedule(schedule) {
            this.editingScheduleId = schedule.id;
            this.showScheduleForm = true;
            this.scheduleForm = {
                title: schedule.title,
                time_of_day: schedule.time_of_day,
                duration_min: schedule.duration_min,
                link: schedule.link || '',
                description: schedule.description || '',
                profile: schedule.profile,
                escalate_to: schedule.escalate_to || '',
                recurrence: schedule.recurrence,
                recurrence_rule: schedule.recurrence_rule || '',
            };
        },

        async saveSchedule() {
            this.error = '';
            this.success = '';
            this.creating = true;

            const body = {
                title: this.scheduleForm.title,
                time_of_day: this.scheduleForm.time_of_day,
                duration_min: this.scheduleForm.duration_min || 0,
                profile: this.scheduleForm.profile || 'meeting',
                recurrence: this.scheduleForm.recurrence,
            };
            if (this.scheduleForm.link) body.link = this.scheduleForm.link;
            if (this.scheduleForm.description) body.description = this.scheduleForm.description;
            if (this.scheduleForm.escalate_to) body.escalate_to = this.scheduleForm.escalate_to;
            if (this.scheduleForm.recurrence_rule) body.recurrence_rule = this.scheduleForm.recurrence_rule;

            try {
                const method = this.editingScheduleId ? 'PATCH' : 'POST';
                const url = this.editingScheduleId ? `/api/schedules/${this.editingScheduleId}` : '/api/schedules';
                const resp = await this._fetch(url, {
                    method: method,
                    body: JSON.stringify(body),
                });

                if (resp.ok) {
                    this.success = this.editingScheduleId ? 'Schedule updated.' : 'Schedule created.';
                    this.resetScheduleForm();
                    this.editingScheduleId = null;
                    this.showScheduleForm = false;
                    await this.refresh();
                    this._clearAlerts();
                } else {
                    const err = await resp.json();
                    this.error = err.detail || `Error ${resp.status}`;
                }
            } catch (e) {
                this.error = `Failed: ${e.message}`;
            } finally {
                this.creating = false;
            }
        },

        async toggleSchedule(id, active) {
            this.error = '';
            this.success = '';
            try {
                const resp = await this._fetch(`/api/schedules/${id}`, {
                    method: 'PATCH',
                    body: JSON.stringify({ is_active: active }),
                });
                if (resp.ok) {
                    this.success = active ? 'Schedule activated.' : 'Schedule deactivated.';
                    await this.refresh();
                    this._clearAlerts();
                } else {
                    const err = await resp.json();
                    this.error = err.detail || `Error ${resp.status}`;
                }
            } catch (e) {
                this.error = `Failed: ${e.message}`;
            }
        },

        async deleteSchedule(id) {
            this.error = '';
            this.success = '';
            try {
                const resp = await this._fetch(`/api/schedules/${id}`, {
                    method: 'DELETE',
                });
                if (resp.ok) {
                    this.success = 'Schedule deleted.';
                    await this.refresh();
                    this._clearAlerts();
                } else {
                    const err = await resp.json();
                    this.error = err.detail || `Error ${resp.status}`;
                }
            } catch (e) {
                this.error = `Failed: ${e.message}`;
            }
        },

        /* Helpers */
        formatDate(iso) {
            if (!iso) return '';
            const d = new Date(iso);
            const day = d.toLocaleDateString('en-GB', {
                weekday: 'short', day: 'numeric', month: 'short'
            });
            const time = d.toLocaleTimeString('en-GB', {
                hour: '2-digit', minute: '2-digit'
            });
            return `${day} ${time}`;
        },

        _fetch(path, opts = {}) {
            return fetch(path, {
                ...opts,
                headers: {
                    'Authorization': `Bearer ${this.token}`,
                    'Content-Type': 'application/json',
                    ...(opts.headers || {}),
                },
            });
        },

        _startPolling() {
            this._stopPolling();
            this._pollInterval = setInterval(() => this.refresh(), 30000);
        },

        _stopPolling() {
            if (this._pollInterval) {
                clearInterval(this._pollInterval);
                this._pollInterval = null;
            }
        },

        _clearAlerts() {
            setTimeout(() => {
                this.success = '';
                this.error = '';
            }, 4000);
        },
    };
}
</script>
</body>
